<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartNet VPN</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
body { background: #f5f6fa; }
.card { border-radius: 15px; }
.card-header { background: #0d6efd; color: #fff; font-weight: 600; }
.btn-primary:hover { background: #0b5ed7; }
.btn-success:hover { background: #198754; }
pre { background: #e9ecef; border-radius: 10px; padding: 15px; }
.alert { display: none; }
.loader {
  border: 4px solid #f3f3f3;
  border-top: 4px solid #3498db;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s linear infinite;
  margin: 0 auto;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="container py-5">

<div class="text-center mb-4">
<h1 class="fw-bold">SmartNet JSON Decryptor</h1>
<p class="text-muted">Upload a JSON file or provide a CORS-safe URL to decrypt your SmartNet configuration.</p>
</div>

<!-- Alert Box -->
<div class="alert alert-danger alert-dismissible fade show" role="alert" id="errorAlert">
  <span id="alertMessage"></span>
  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<!-- File Upload -->
<div class="card mb-4 shadow-sm">
<div class="card-header">1️⃣ Upload JSON File</div>
<div class="card-body">
<input type="file" id="fileInput" class="form-control mb-3">
<button class="btn btn-primary w-100" onclick="decryptJSONFromFile()">ডিক্রিপ্ট করুন</button>
</div>
</div>

<!-- URL Fetch -->
<div class="card mb-4 shadow-sm">
<div class="card-header">2️⃣ Or Use JSON File URL</div>
<div class="card-body">
<input type="text" id="urlInput" class="form-control mb-3" placeholder="Paste GitHub Raw/Netlify JSON URL" value="https://speedvipvpn.xyz/uploads/json/d92a81438f3bc8642124.json">
<div class="text-center mb-3" id="loadingSpinner" style="display: none;">
  <div class="loader"></div>
  <p class="mt-2">Fetching data...</p>
</div>
<button class="btn btn-primary w-100" onclick="fetchAndDecrypt()">ডিক্রিপ্ট করুন</button>
</div>
</div>

<!-- Output -->
<div class="card shadow-sm">
<div class="card-header">🔍 ডিক্রিপ্ট করা JSON</div>
<div class="card-body">
<pre id="output" style="max-height:400px; overflow:auto;">No data decrypted yet.</pre>
<button class="btn btn-success w-100 mt-3" onclick="downloadJSON()">Download JSON</button>
</div>
</div>

</div>

<script>
const password = "famous1987";
const iv = CryptoJS.enc.Hex.parse('00000000000000000000000000000000');
let decryptedData = null;

// Show alert message
function showAlert(message, isError = true) {
  const alert = document.getElementById('errorAlert');
  const alertMessage = document.getElementById('alertMessage');
  
  alertMessage.textContent = message;
  alert.classList.remove('alert-success', 'alert-danger');
  alert.classList.add(isError ? 'alert-danger' : 'alert-success');
  alert.style.display = 'block';
}

// Hide alert
function hideAlert() {
  document.getElementById('errorAlert').style.display = 'none';
}

// Show/hide loading spinner
function toggleSpinner(show) {
  document.getElementById('loadingSpinner').style.display = show ? 'block' : 'none';
}

// Try multiple CORS proxies
async function tryProxies(url) {
  const proxies = [
    // No proxy (direct request)
    url,
    // CORS proxies
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://cors-anywhere.herokuapp.com/${url}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
  ];
  
  for (const proxyUrl of proxies) {
    try {
      const response = await fetch(proxyUrl, {
        headers: {
          'Accept': 'application/json',
          'X-Requested-With': 'XMLHttpRequest'
        }
      });
      
      if (response.ok) {
        const data = await response.text();
        return data;
      }
    } catch (error) {
      console.log(`Proxy failed: ${proxyUrl}`, error);
      // Try next proxy
      continue;
    }
  }
  
  throw new Error("All CORS proxies failed. Try uploading the file directly.");
}

function decryptAES(ciphertextB64){
    try{
        const ciphertext = CryptoJS.enc.Base64.parse(ciphertextB64);
        const decrypted = CryptoJS.AES.decrypt(
            {ciphertext: ciphertext},
            CryptoJS.SHA256(password),
            { iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }
        );
        return decrypted.toString(CryptoJS.enc.Utf8) || ciphertextB64;
    }catch(e){
        return ciphertextB64;
    }
}

// File Upload
async function decryptJSONFromFile(){
    hideAlert();
    const fileInput = document.getElementById("fileInput");
    if(!fileInput.files.length){ 
        showAlert("ফাইল সিলেক্ট করুন!"); 
        return; 
    }
    
    try {
        const text = await fileInput.files[0].text();
        let data;
        try{ 
            data = JSON.parse(text); 
        } catch(e){ 
            showAlert("Invalid JSON File!"); 
            return; 
        }
        processData(data);
        showAlert("File successfully decrypted!", false);
    } catch (error) {
        showAlert("Error processing file: " + error.message);
    }
}

// URL Fetch (CORS-safe)
async function fetchAndDecrypt(){
    hideAlert();
    const url = document.getElementById("urlInput").value.trim();
    if(!url){ 
        showAlert("URL দিন!"); 
        return; 
    }

    toggleSpinner(true);
    
    try {
        const encryptedText = await tryProxies(url);
        const decryptedText = decryptAES(encryptedText);
        let data;
        
        try{ 
            data = JSON.parse(decryptedText); 
        } catch(e){
            // If it's not JSON, just show the decrypted text
            decryptedData = decryptedText;
            document.getElementById("output").textContent = decryptedText;
            showAlert("Decrypted data is not JSON, showing raw text", false);
            toggleSpinner(false);
            return;
        }
        
        processData(data);
        showAlert("URL data successfully decrypted!", false);
    } catch(e) { 
        showAlert("Error fetching or decrypting: " + e.message); 
    } finally {
        toggleSpinner(false);
    }
}

// Process JSON
function processData(data){
    const serverFields=["V2rayID","ServerIP","ServerCloudFront","ServerHTTP","ProxyHost","Username","Password","sUdpObfs"];
    const networkFields=["NetworkPayload","SquidProxy","NetworkFrontQuery","NetworkBackQuery","SSLSNI"];
    const otherFields=["config_url","account_api","cloud_get_api","cloud_post_api","AppConfPass","Ovpn_Cert"];

    if(data.Servers) for(let s of data.Servers) for(let f of serverFields) if(s[f]) s[f]=decryptAES(s[f]);
    if(data.HTTPNetworks) for(let n of data.HTTPNetworks) for(let f of networkFields) if(n[f]) n[f]=decryptAES(n[f]);
    for(let f of otherFields) if(data[f]) data[f]=decryptAES(data[f]);

    decryptedData=data;
    document.getElementById("output").textContent=JSON.stringify(data,null,2);
}

// Download JSON
function downloadJSON(){
    if(!decryptedData){ 
        showAlert("প্রথমে ডিক্রিপ্ট করুন!"); 
        return; 
    }

    let content = (typeof decryptedData==="string")?decryptedData:JSON.stringify(decryptedData,null,2);
    const blob = new Blob([content], {type:"application/json;charset=utf-8"});
    
    if(window.navigator && window.navigator.msSaveOrOpenBlob){
        window.navigator.msSaveOrOpenBlob(blob,"smarnetvip.json");
    }else{
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "smarnetvip.json";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
    }
    
    showAlert("File downloaded successfully!", false);
}

// Initialize the page
document.addEventListener('DOMContentLoaded', function() {
  // Add example URL for testing
  document.getElementById('urlInput').value = 'https://bornaliltd.com/uploads/json/3476695E796616B577F9.json';
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
